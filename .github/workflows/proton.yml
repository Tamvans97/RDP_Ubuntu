name: Build & Release Proton-Clang 13 (Ubuntu 22.04)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions: # WAJIB: Biar bot GitHub bisa bikin Release
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Pasang Dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build build-essential python3 python3-distutils \
          libssl-dev libelf-dev zlib1g-dev libncurses5-dev git

    - name: Clone LLVM Project
      run: |
        git clone https://github.com/llvm/llvm-project.git --depth=1 -b llvmorg-13.0.0
        mkdir -p install

    - name: Konfigurasi CMake
      run: |
        cd llvm-project
        mkdir build && cd build
        cmake -G Ninja ../llvm \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;lld;polly" \
          -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
          -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi;libunwind" \
          -DCLANG_VENDOR="Proton-AArch64" \
          -DCMAKE_INSTALL_PREFIX=../../install \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DLLVM_STATIC_LINK_CXX_STDLIB=ON

    - name: Mulai Kompilasi (Heavy Task)
      run: |
        cd llvm-project/build
        ninja install

    - name: Kompres Hasil Build
      run: |
        # Ambil tanggal buat nama file unik
        TAG_NAME="build-$(date +'%Y.%m.%d-%H%M')"
        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
        tar -czvf proton-clang-13-aarch64.tar.gz install/

    - name: Upload ke Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: proton-clang-bin
        path: proton-clang-13-aarch64.tar.gz

    - name: Create GitHub Release & Upload
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: Proton-Clang 13 Build ${{ env.TAG_NAME }}
        draft: false
        prerelease: false
        files: |
          proton-clang-13-aarch64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
